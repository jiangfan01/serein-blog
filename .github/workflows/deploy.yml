name: Deploy to Baota server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is required" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY is required" && exit 1)

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pack source
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='*.tsbuildinfo' \
            -czf /tmp/serein-blog.tar.gz .

      - name: Upload source
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          user="${DEPLOY_USER:-root}"
          scp -i ~/.ssh/deploy_key -P "$port" /tmp/serein-blog.tar.gz "$user@$DEPLOY_HOST:/tmp/serein-blog.tar.gz"

      - name: Deploy with PM2
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          port="${DEPLOY_PORT:-22}"
          user="${DEPLOY_USER:-root}"

          ssh -i ~/.ssh/deploy_key -p "$port" "$user@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          APP_DIR="/www/wwwroot/serein-blog"
          APP_PORT="3000"

          if ! command -v node >/dev/null 2>&1; then
            echo "node is not installed on the server. Install Node.js 20+ first."
            exit 1
          fi

          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -f "$APP_DIR/.env" ]; then
            echo "$APP_DIR/.env is missing. Keep production env vars on the server."
            exit 1
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name node_modules \
            ! -name .next \
            ! -name .env \
            -exec rm -rf {} +

          tar -xzf /tmp/serein-blog.tar.gz -C "$APP_DIR"
          find "$APP_DIR" -name '._*' -delete

          if ! command -v pnpm >/dev/null 2>&1; then
            npm install -g pnpm
          fi

          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm exec prisma db push
          pnpm build

          if pm2 describe serein-blog >/dev/null 2>&1; then
            pm2 restart serein-blog --update-env
          else
            PORT="$APP_PORT" pm2 start pnpm --name serein-blog -- start
          fi

          pm2 save
          REMOTE
